services:
  cliff:
    # Production: pull the signed, multi-arch image from GHCR.
    # Verify the digest before deploying — see docs/verify-release.md.
    # Override the tag via CLIFF_VERSION (e.g. CLIFF_VERSION=0.1.0-alpha).
    image: ghcr.io/cliff-security/cliff:${CLIFF_VERSION:-latest}
    # Local dev: comment out `image:` above and uncomment this block to
    # build from source.
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    #   args:
    #     CLIFF_VERSION: dev
    #     CLIFF_REVISION: dev
    #     CLIFF_CREATED: "1970-01-01T00:00:00Z"
    ports:
      - "${CLIFF_APP_PORT:-8000}:8000"
      # Port 3000 is the one-shot OAuth callback for the OpenRouter
      # onboarding flow (Tier 2). The listener is only bound while a
      # connect flow is in progress (~30 seconds during a single
      # onboarding handshake) and is released as soon as the handshake
      # terminates. Published by default so the recommended OpenRouter
      # path works out of the box; if your host already has something
      # on port 3000, override or comment this line and use BYOK
      # instead (the UI handles the port-3000-busy case gracefully).
      - "3000:3000"
    volumes:
      - cliff-data:/data
    environment:
      # App
      - CLIFF_APP_PORT=8000
      # AI model — set your provider key
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Credential vault (base64-encoded 32-byte key)
      - CLIFF_CREDENTIAL_KEY=${CLIFF_CREDENTIAL_KEY:-}
      # Data
      - CLIFF_DATA_DIR=/data
      # Demo mode — seed sample findings on first run
      # - CLIFF_DEMO=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  cliff-data:
